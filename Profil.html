<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f6fa] text-[#1e293b] flex h-screen overflow-hidden">

    <aside class="w-20 bg-white border-r border-slate-200 flex flex-col justify-between items-center py-6 flex-shrink-0">
        <div class="flex flex-col items-center gap-8 w-full">
            <span class="text-blue-700 font-bold text-xl tracking-tight">forum</span>
            <nav class="flex flex-col gap-6 w-full items-center">
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="message-square" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="phone" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="calendar" class="w-6 h-6"></i>
                </button>
            </nav>
        </div>

        <div class="flex flex-col items-center gap-6 w-full">
            <div class="relative w-full flex justify-center">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r"></div>
                <button class="p-3 text-blue-600 rounded-xl">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </button>
            </div>
            <button class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition shadow-sm">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-y-auto">
        
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center flex-shrink-0">
            <h1 class="text-blue-600 font-bold text-xl">Kadea Chat</h1>
            <div class="flex items-center gap-4 text-slate-600">
                <button class="p-2 hover:bg-slate-100 rounded-lg transition">
                    <i data-lucide="video" class="w-5 h-5"></i>
                </button>
                <button class="p-2 hover:bg-slate-100 rounded-lg transition">
                    <i data-lucide="phone" class="w-5 h-5"></i>
                </button>
                <button class="p-2 hover:bg-slate-100 rounded-lg transition">
                    <i data-lucide="more-vertical" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 max-w-4xl w-full mx-auto px-6 py-10 flex flex-col items-center">
            
            <div class="flex flex-col items-center text-center mb-8">
                <div class="relative mb-4">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" 
                         alt="Alex Rivera" 
                         class="w-28 h-28 rounded-full object-cover border border-slate-200 shadow-sm">
                    <span class="absolute bottom-1 right-2 w-5 h-5 bg-green-500 border-4 border-white rounded-full"></span>
                </div>
                
                <h2 class="text-2xl font-bold text-slate-800">Alex Rivera</h2>
                <p class="text-sm text-slate-500 mt-0.5">alex.rivera@example.com</p>
                
                <div class="mt-3 inline-flex items-center gap-1.5 bg-blue-50 text-blue-600 text-xs font-medium px-3 py-1 rounded-full border border-blue-100">
                    <i data-lucide="badge-check" class="w-3.5 h-3.5"></i>
                    Membre depuis Octobre 2023
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full mb-8">
                
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-800 text-base">Account Details</h3>
                        <i data-lucide="contact" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <span class="text-[11px] font-bold tracking-wider text-slate-400 uppercase block">Username</span>
                            <span class="text-sm font-medium text-slate-700">arivera_chat</span>
                        </div>
                        <div>
                            <span class="text-[11px] font-bold tracking-wider text-slate-400 uppercase block">Phone</span>
                            <span class="text-sm font-medium text-slate-700">+1 (555) 012-3456</span>
                        </div>
                        <div>
                            <span class="text-[11px] font-bold tracking-wider text-slate-400 uppercase block">Language</span>
                            <span class="text-sm font-medium text-slate-700">English (US)</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-slate-800 text-base">Privacy & Security</h3>
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        
                        <div class="space-y-1">
                            <div class="flex items-center justify-between py-2.5">
                                <div class="flex items-center gap-3 text-slate-700">
                                    <i data-lucide="shield-check" class="w-5 h-5 text-slate-500"></i>
                                    <span class="text-sm font-medium">Two-Factor Auth</span>
                                </div>
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2.5 py-0.5 rounded">Enabled</span>
                            </div>
                            
                            <button class="w-full flex items-center justify-between py-2.5 text-left hover:bg-slate-50 rounded-lg transition -mx-2 px-2">
                                <div class="flex items-center gap-3 text-slate-700">
                                    <i data-lucide="eye" class="w-5 h-5 text-slate-500"></i>
                                    <span class="text-sm font-medium">Active Sessions</span>
                                </div>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                            </button>
                            
                            <button class="w-full flex items-center justify-between py-2.5 text-left hover:bg-slate-50 rounded-lg transition -mx-2 px-2">
                                <div class="flex items-center gap-3 text-slate-700">
                                    <i data-lucide="bell" class="w-5 h-5 text-slate-500"></i>
                                    <span class="text-sm font-medium">Alert Preferences</span>
                                </div>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>

            <div class="w-full max-w-md flex flex-col gap-3 items-center mb-12">
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-sm transition">
                    <i data-lucide="pen-tool" class="w-4 h-4"></i>
                    Edit Profile
                </button>
                
                <button class="w-full bg-[#e2e8f0] hover:bg-slate-300 text-slate-700 font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition">
                    <i data-lucide="key-round" class="w-4 h-4"></i>
                    Change Password
                </button>
                
                <button class="mt-2 text-red-600 hover:text-red-700 font-semibold flex items-center gap-2 transition text-sm">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    Logout
                </button>
            </div>

            <footer class="w-full border-t border-slate-200 pt-4 text-center">
                <p class="text-[11px] text-slate-400 tracking-wide">Kadea Chat v1.0.0 — Encryption Active</p>
            </footer>

        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
