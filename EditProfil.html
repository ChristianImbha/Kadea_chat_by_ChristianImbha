<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Kadea-Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f6fa] text-[#1e293b] flex h-screen overflow-hidden">

    <!-- Barre latérale (Sidebar) -->
    <aside class="w-20 bg-white border-r border-slate-200 flex flex-col justify-between items-center py-6 flex-shrink-0">
        <div class="flex flex-col items-center gap-8 w-full">
            <span class="text-blue-700 font-bold text-xl tracking-tight">forum</span>
            <nav class="flex flex-col gap-6 w-full items-center">
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="message-square" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="phone" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="calendar" class="w-6 h-6"></i>
                </button>
            </nav>
        </div>

        <div class="flex flex-col items-center gap-6 w-full">
            <div class="relative w-full flex justify-center">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r"></div>
                <button class="p-3 text-blue-600 rounded-xl">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </button>
            </div>
            <button class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition shadow-sm">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>

    <!-- Conteneur principal du Profil -->
    <main class="flex flex-1 flex-col h-screen bg-gray-50" id="chat-panel">
        
        <!-- En-tête -->
        <div class="flex items-center justify-between bg-gray-100 p-3 border-b border-gray-200 shadow-sm">
            <div class="flex items-center space-x-3">                    
                <h1 id="active-chat-title" class="font-bold text-blue-600 text-sm">Kadea-Chat • Mon Profil</h1>                      
            </div>
        </div>

        <!-- Zone de formulaire -->
        <div class="flex-1 overflow-y-auto p-6 flex flex-col items-center justify-center">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md flex flex-col items-center">
                
                <!-- Section Avatar -->
                <div class="relative group cursor-pointer mb-6" id="change-avatar-trigger">
                    <img id="profile-page-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=default" alt="Avatar" class="w-28 h-28 rounded-full border-4 border-white object-cover shadow-lg group-hover:opacity-80 transition">
                    <!-- Icône overlay au survol -->
                    <div class="absolute inset-0 flex items-center justify-center bg-black/30 rounded-full opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="camera" class="w-6 h-6 text-white"></i>
                    </div>
                    <!-- Input file masqué -->
                    <input type="file" id="avatar-input" accept="image/*" class="hidden">
                </div>
                
                <!-- Formulaire d'informations -->
                <form id="profile-form" class="space-y-5 w-full">
                    <div>
                        <label class="block text-sm font-medium text-blue-600 mb-1">Votre nom</label>
                        <div class="flex items-center border-b-2 border-gray-200 focus-within:border-[#008069] py-2 transition">
                            <input type="text" id="profile-name" placeholder="Ex: Christian Imbha" required
                                class="appearance-none bg-transparent border-none w-full text-gray-700 mr-3 py-1 px-2 leading-tight focus:outline-none">
                            <i class="fas fa-pen text-gray-400 text-sm"></i>
                        </div>
                        <p class="text-xs text-gray-400 mt-1">Ce nom sera visible par vos contacts Kadea.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-blue-600 mb-1">Actu / Bio</label>
                        <div class="flex items-center border-b-2 border-gray-200 focus-within:border-[#008069] py-2 transition">
                            <input type="text" id="profile-status" placeholder="Disponible"
                                class="appearance-none bg-transparent border-none w-full text-gray-700 mr-3 py-1 px-2 leading-tight focus:outline-none">
                            <i class="fas fa-pen text-gray-400 text-sm"></i>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-md shadow-md transition duration-200 uppercase tracking-wide text-sm">
                            Enregistrer les modifications
                        </button>
                    </div>
                </form>

                <!-- Zone de message d'alerte -->
                <div id="alert-box" class="hidden w-full p-3 rounded text-sm text-center font-medium mt-4"></div>

            </div>
        </div>            
    </main>

    <!-- Initialisation des icônes Lucide -->
    <script>
        lucide.createIcons();
    </script>
    <!-- Chargement correct du script JS -->
    <script src="profil.js"></script>
</body>
</html>
