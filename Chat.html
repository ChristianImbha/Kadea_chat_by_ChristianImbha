<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex h-screen w-full bg-slate-50 overflow-hidden font-sans antialiased text-gray-800">
    
    <!-- BARRE LATÉRALE : Masquée sur mobile, visible sur tablette/PC -->
    <aside class="hidden md:flex w-16 bg-white border-r border-gray-200 flex-col justify-between items-center py-4 shrink-0">
        <div class="flex flex-col gap-6 items-center w-full">
            <div class="text-blue-600 p-2 rounded-xl bg-blue-50">
                <i data-lucide="message-square" class="w-6 h-6"></i>
            </div>
            <div class="text-gray-400 hover:text-gray-600 p-2 cursor-pointer transition">
                <i data-lucide="users" class="w-6 h-6"></i>
            </div>
            <div class="text-gray-400 hover:text-gray-600 p-2 cursor-pointer transition">
                <i data-lucide="phone" class="w-6 h-6"></i>
            </div>
            <div class="text-gray-400 hover:text-gray-600 p-2 cursor-pointer transition">
                <i data-lucide="folder-archive" class="w-6 h-6"></i>
            </div>
        </div>
        <div class="text-gray-400 hover:text-gray-600 p-2 cursor-pointer transition">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
    </aside>

    <!-- SECTION GAUCHE : Liste des conversations (Prend tout l'écran sur mobile) -->
    <section id="col-left" class="w-full md:w-80 bg-white border-r border-gray-200 flex flex-col shrink-0 h-full transition-all duration-300">
        
        <!-- En-tête Profil -->
        <div class="p-4 flex flex-col justify-between items-center border-b border-gray-100">
            <div class="flex items-center gap-3 w-full">
                <div class="relative shrink-0">
                    <img id="active-user-avatar" src="https://via.placeholder.com/40" alt="Avatar" class="w-10 h-10 rounded-full object-cover">
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <h2 id="active-user-name" class="text-sm font-semibold text-gray-900">Mon Profil</h2>
                    <p class="text-xs text-gray-500">Statut : Actif</p>
                </div>
            </div>
        </div>  
        
        <!-- Barre de recherche -->
        <div class="p-4 relative">
            <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-7 top-1/2 -translate-y-1/2"></i>
            <input type="text" placeholder="Rechercher une conversation..." class="w-full bg-gray-50 pl-10 pr-4 py-2 rounded-xl text-sm border-0 focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition">
        </div>

        <!-- Liste des conversations -->
        <div id="rooms-list" class="flex-1 overflow-y-auto space-y-1 px-2 pb-4">
            <!-- Les conversations s'injectent ici automatiquement -->
        </div>
        
    </section>

    <!-- SECTION PRINCIPALE : Fenêtre de Chat (Cachée par défaut sur mobile) -->
    <main id="col-right" class="hidden md:flex flex-1 bg-slate-50 flex-col h-full transition-all duration-300">
        
        <!-- Header du Chat avec Bouton Retour dynamique -->
        <header class="h-16 bg-white border-b border-gray-200 flex justify-between items-center px-6 shrink-0">
            <div class="flex items-center gap-3">
                
                <!-- 🚀 BOUTON RETOUR : Visible uniquement sur mobile -->
                <button id="back-to-list-btn" class="md:hidden mr-2 p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition duration-200">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>

                <div class="relative shrink-0">
                    <img id="active-chat-avatar" src="https://via.placeholder.com/40" alt="Avatar Conversation" class="w-10 h-10 rounded-full object-cover">
                    <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <h2 id="active-chat-title" class="text-sm font-semibold text-gray-900">Sélectionnez une discussion</h2>
                    <p id="active-chat-status" class="text-xs text-gray-400">Hors ligne</p>
                </div>
            </div>
        </header>

        <!-- Conteneur des messages -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col">
            <div class="text-center text-gray-400 text-sm my-auto">
                Cliquez sur une conversation à gauche pour commencer à discuter.
            </div>
        </div>

        <!-- Formulaire d'envoi de message -->
        <form id="message-form" class="p-4 bg-white border-t border-gray-200 flex items-center gap-3">
            <button type="button" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-50 transition">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
            <button type="button" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-50 transition mr-1">
                <i data-lucide="smile" class="w-6 h-6"></i>
            </button>
            
            <div class="flex-1 relative flex items-center">
                <input type="text" id="message-input" autocomplete="off" placeholder="Tapez votre message..." class="w-full bg-gray-50 border border-gray-200 text-sm pl-4 pr-12 py-3 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white transition">
                <button type="submit" id="send-btn" class="absolute right-2 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl transition shadow-sm cursor-pointer">
                    <i data-lucide="send-horizontal" class="w-4 h-4"></i>
                </button>
            </div>
        </form>
    </main>

    <script>
        lucide.createIcons();
    </script>
    
    <script src="chat.js"></script>
     <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>
</body>
</html>
